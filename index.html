  <link rel="manifest" href="./public/site.webmanifest" />

  <style>
    :root {
      --frame: 30px;
      --radius: 30px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .screen {
      position: fixed;
      inset: var(--frame);
      border-radius: var(--radius);
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      overflow: hidden;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 25%, rgba(145, 185, 255, 0.09), transparent 40%),
        radial-gradient(circle at 82% 70%, rgba(165, 205, 255, 0.07), transparent 44%);
      z-index: 0;
      pointer-events: none;
    }

    .title {
      position: relative;
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      transform: translateX(0.32em);
      color: #000;
      font-weight: 900;
      font-size: clamp(26px, 4.3vw, 62px);
      letter-spacing: 0.01em;
      line-height: 1;
      text-align: center;
      z-index: 1;
      text-transform: none;
      white-space: nowrap;
    }

    .title-part {
      position: relative;
      display: inline-block;
      filter: blur(0.18px);
      text-shadow:
        0 0 1px rgba(0, 0, 0, 0.92),
        0.8px 0.8px 0 rgba(0, 0, 0, 0.85),
        -0.6px 0.5px 0 rgba(0, 0, 0, 0.72);
      animation: textBuzz 0.13s steps(2) infinite;
    }

    .title-dots {
      width: 3ch;
      margin-left: 0.04em;
      text-align: left;
      white-space: pre;
    }

    .title-part::before,
    .title-part::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      color: #000;
      pointer-events: none;
    }

    .title-part::before {
      opacity: 0.35;
      filter: blur(1px);
      transform: translate(1px, 1px);
    }

    .title-part::after {
      opacity: 0.5;
      filter: blur(0.55px);
      transform: translate(-0.5px, 0.4px);
    }

    .noise,
    .scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .noise {
      opacity: 0.34;
      background-image:
        radial-gradient(rgba(0, 0, 0, 0.24) 0.55px, transparent 0.68px),
        radial-gradient(rgba(0, 0, 0, 0.14) 0.35px, transparent 0.55px);
      background-size: 3px 3px, 5px 5px;
      background-position: 0 0, 1px 1px;
      mix-blend-mode: multiply;
      animation: noiseShift 0.2s steps(5) infinite, flicker 0.12s infinite;
    }

    .scanlines {
      background: repeating-linear-gradient(
        to bottom,
        rgba(19, 33, 58, 0.12) 0px,
        rgba(19, 33, 58, 0.12) 1px,
        rgba(255, 255, 255, 0) 2px,
        rgba(255, 255, 255, 0) 4px
      );
      opacity: 0.19;
      animation: flicker 0.18s infinite;
    }

    @keyframes noiseShift {
      0% {
        transform: translate(0, 0);
      }
      25% {
        transform: translate(-1.5%, 0.8%);
      }
      50% {
        transform: translate(1.2%, -0.9%);
      }
      75% {
        transform: translate(-0.8%, 1.1%);
      }
      100% {
        transform: translate(0.6%, -1.2%);
      }
    }

    @keyframes flicker {
      0% {
        opacity: 0.24;
      }
      20% {
        opacity: 0.34;
      }
      40% {
        opacity: 0.21;
      }
      60% {
        opacity: 0.3;
      }
      80% {
        opacity: 0.22;
      }
      100% {
        opacity: 0.28;
      }
    }

    @keyframes textBuzz {
      0% {
        transform: translate(0, 0);
      }
      25% {
        transform: translate(0.2px, -0.1px);
      }
      50% {
        transform: translate(-0.25px, 0.15px);
      }
      75% {
        transform: translate(0.15px, 0.2px);
      }
      100% {
        transform: translate(0, 0);
      }
    }

    @media (max-width: 768px) {
      :root {
        --frame: 15px;
        --radius: 22px;
      }

      .title {
        font-size: clamp(21px, 7.3vw, 36px);
      }
    }

  </style>
</head>
<body>
  <main class="screen">
    <h1 class="title" id="loadingTitle">
      <span class="title-part" id="loadingBase" data-text="lns portfolio">lns portfolio</span>
      <span class="title-part title-dots" id="loadingDots" data-text=""></span>
    </h1>
    <div class="noise"></div>
    <div class="scanlines"></div>
  </main>

  <script>
    const dotsEl = document.getElementById("loadingDots");
    const dots = ["", ".", "..", "..."];
    const timing = [320, 360, 430, 720];
    let step = 0;

    function render() {
      const value = dots[step];
      dotsEl.textContent = value;
      dotsEl.setAttribute("data-text", value);
    }

    function animateDots() {
      step = (step + 1) % dots.length;
      render();

      const jitter = Math.floor(Math.random() * 90) - 45;
      const delay = Math.max(220, timing[step] + jitter);
      setTimeout(animateDots, delay);
    }

    render();
    setTimeout(animateDots, 360);
  </script>
</body>
</html>
